name: gh-build-size

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  gh-build-size:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package artifacts
        run: bun run build

      - name: Measure build size
        uses: kitsuyui/gh-build-size@cd266e67adc5bd8af79f4e79ed9d7557eecf0d89
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
