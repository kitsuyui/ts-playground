name: Release

on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    # "released" events are emitted either when directly be released or be edited from pre-released.
    types: [prereleased, released]

jobs:
  deploy:
    runs-on: ubuntu-latest

    continue-on-error: true

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v6
        with:
          # https://nodejs.org/en/about/previous-releases
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: install and build
        run: |
          bun install --frozen-lockfile
          bun run build
          bun run validate

      - name: Set tag rc
        if: github.event_name == 'pull_request'
        run: |
          git config user.email "dummy@dummy"
          git config user.name "dummy"
          # dummy tag for dry-run
          git tag v999.999.999-rc.$GITHUB_RUN_NUMBER

      - name: set git tag version
        run: |
          git config user.email "dummy@dummy"
          git config user.name "dummy"
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            VERSION="999.999.999-rc.${GITHUB_RUN_NUMBER}"
          fi
          for dir in . packages/*; do
            (cd "$dir" && bun pm pkg set version="$VERSION")
          done
          bun run format

      - name: deploy
        # https://docs.npmjs.com/generating-provenance-statements
        run: |
          set -eu
          for dir in packages/*; do
            if grep -q '"private": true' "$dir/package.json"; then
              continue
            fi
            (cd "$dir" && NPM_CONFIG_PROVENANCE=true bun publish --access public)
          done
        if: github.event_name == 'release' && !github.event.release.prerelease
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: deploy (dry-run)
        run: |
          set -eu
          for dir in packages/*; do
            if grep -q '"private": true' "$dir/package.json"; then
              continue
            fi
            (cd "$dir" && NPM_CONFIG_PROVENANCE=true bun publish --access public --dry-run)
          done
        if: github.event_name != 'release' || github.event.release.prerelease
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
