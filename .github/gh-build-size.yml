version: 1
publish:
  enabled: true
  branch: gh-build-size-assets
comment:
  key: package-build-size
targets:
  - id: total
    label: Total package artifacts
    files:
      - packages/*/dist/**
    compressions: [raw, gzip, brotli]
    badge:
      compression: gzip
      label: package artifacts (gzip)
resolvers:
  - type: workspace-packages
    root: packages
    dist_dir: dist
    include:
      - "**/*"
    compressions: [raw, gzip, brotli]
    badge:
      compression: gzip
